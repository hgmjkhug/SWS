<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | THACO INDUSTRIES</title>
    <link rel="icon" type="image/svg+xml" href="https://demo-qtsx.thacoindustries.com/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../../falling.css">
    <link rel="stylesheet" href="../../global-transition.css">
</head>
<body>
    <div class="page-transition-overlay" id="page-transition-overlay"></div>
    <script>
        (function() {
            const overlay = document.getElementById('page-transition-overlay');
            if (sessionStorage.getItem('sakura_transitioning') === 'true') {
                overlay.classList.add('active');
                sessionStorage.removeItem('sakura_transitioning');
            }
        })();
    </script>
    <div class="login-container">
        <!-- Left Panel: Branding -->
        <div class="login-left">
            <div class="logo-container">
                <div class="brand-text">THACO<br>INDUSTRIES</div>
            </div>
        </div>

        <!-- Right Panel: Login Form -->
        <div class="login-right">
            <div class="login-form-wrapper">
                <h2 class="form-title">Đăng nhập tài khoản</h2>
                
                <form id="loginForm" class="login-form" novalidate>
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="Nhập vào tên đăng nhập">
                        </div>
                        <span class="error-message" id="username-error">Vui lòng nhập tên đăng nhập</span>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Nhập vào mật khẩu">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                                <i class="far fa-eye-slash"></i>
                            </button>
                        </div>
                        <span class="error-message" id="password-error">Vui lòng nhập mật khẩu</span>
                    </div>

                    <button type="submit" class="btn-login">Đăng nhập</button>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
