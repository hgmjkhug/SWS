<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Nhóm thiết bị</title>
    <link
      rel="stylesheet"
    />
    <link rel="stylesheet" href="device-type.css" />
  </head>

  <body>
    <div class="device-type-container">
      <!-- Actions Toolbar -->
      <div class="device-type-actions">
        <div class="device-type-filters">
          <div class="filter-group">
            <!-- <span class="filter-title">Tìm kiếm</span> -->
            <input
              type="text"
              class="device-type-search-input"
              id="search-input"
              placeholder="Tìm theo mã hoặc tên nhóm thiết bị"
            />
          </div>
        </div>

        <div class="action-buttons">
          <button
            class="btn btn-outline-danger"
            id="bulk-delete-btn"
            onclick="deleteSelected()"
            disabled
          >
            <i class="fas fa-trash"></i> (<span id="selected-count">0</span>)
          </button>
          <button class="btn btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Thêm mới
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="device-type-table">
          <thead>
            <tr>
              <th>
                <input
                  type="checkbox"
                  id="select-all"
                  onclick="toggleSelectAll()"
                />
              </th>
              <th>STT</th>
              <th>Hình ảnh</th>
              <th>Mã nhóm</th>
              <th>Tên nhóm thiết bị</th>
              <th>Loại thiết bị</th>
              <th>Mô tả</th>
              <!-- <th>Thông số</th> -->
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="device-type-table-body">
            <!-- Rows rendered by JS -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination-bar">
        <div class="pagination-info" id="pagination-info">
          Hiển thị 0-0 của 0 bản ghi
        </div>
        <div class="pagination-controls">
          <button class="page-btn" id="prev-btn" onclick="prevPage()">
            <i class="fas fa-chevron-left"></i>
          </button>
          <div class="page-numbers" id="page-numbers">
            <button class="page-btn active">1</button>
          </div>
          <button class="page-btn" id="next-btn" onclick="nextPage()">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="device-type-modal">
      <div class="modal-box">
        <button class="close-btn" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Thêm mới Nhóm thiết bị</h3>
        </div>
        <div class="modal-body">
          <input type="hidden" id="device-type-id" />
          <div class="form-group">
            <label>Mã nhóm <span class="required">*</span></label>
            <input
              type="text"
              id="device-type-code"
              placeholder="Nhập mã nhóm"
            />
          </div>
          <div class="form-group">
            <label>Tên nhóm <span class="required">*</span></label>
            <input
              type="text"
              id="device-type-name"
              placeholder="Nhập tên nhóm"
            />
          </div>
          <div class="form-group">
            <label>Loại thiết bị <span class="required">*</span></label>
            <input type="hidden" id="device-type-category" value="" />
            <div class="category-toggle-group" id="category-toggle-group">
              <button type="button" class="category-toggle-btn" data-value="autonomous" onclick="selectCategory('autonomous')">
                <i class="fas fa-robot"></i>
                <span>Tự hành</span>
              </button>
              <button type="button" class="category-toggle-btn" data-value="fixed" onclick="selectCategory('fixed')">
                <i class="fas fa-industry"></i>
                <span>Cố định</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>Mô tả</label>
            <textarea
              id="device-type-desc"
              rows="3"
              placeholder="Mô tả chi tiết (tùy chọn)"
            ></textarea>
          </div>
          <div class="form-group">
            <label>Hình ảnh</label>
            <div class="image-upload-area" id="image-upload-area" onclick="document.getElementById('device-type-image-input').click()">
              <input type="file" id="device-type-image-input" accept="image/*" onchange="previewImage(event)" style="display:none" />
              <div class="image-upload-placeholder" id="image-upload-placeholder">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Kéo thả hoặc nhấn để tải ảnh lên</span>
                <small>PNG, JPG, WEBP (tối đa 5MB)</small>
              </div>
              <div class="image-preview-wrapper" id="image-preview-wrapper" style="display:none">
                <img id="image-preview" src="" alt="Preview" />
                <button type="button" class="image-remove-btn" onclick="removeImage(event)" title="Xóa ảnh">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
          <button class="btn btn-primary" onclick="saveDeviceType()">
            Lưu lại
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Popover (Standardized) -->
    <div id="delete-confirm-modal" class="modal-confirm">
      <div class="confirm-content">
        <div class="confirm-icon-box">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h3 class="confirm-title">Xác nhận xóa</h3>
        <p class="confirm-message" id="confirm-delete-message">
          Bạn có chắc chắn muốn xóa nhóm thiết bị này không?<br />Hành động này
          không thể hoàn tác.
        </p>
        <div class="confirm-actions">
          <button onclick="closeDeleteConfirm()" class="btn btn-secondary">
            Hủy
          </button>
          <button onclick="confirmDeleteDeviceType()" class="btn btn-danger">
            Xóa
          </button>
        </div>
      </div>
    </div>

    <script src="device-type.js"></script>
  </body>
</html>
