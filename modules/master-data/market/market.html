<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thị trường - Smart Warehouse</title>
</head>
<body>
    <link rel="stylesheet" href="market.css?v=1.1">
    <div id="main-view">
        <div class="market-container">
            <div class="market-actions">
                <div class="market-filters">
                    <div class="filter-group">
                        <input type="text" id="market-search" class="market-search-input" 
                               placeholder="Tìm theo mã hoặc tên thị trường..." oninput="filterMarkets()">
                    </div>
                </div>
                <div class="action-buttons">
                    <button id="delete-selected-btn" class="btn btn-outline-danger" onclick="deleteSelected()" disabled>
                        <i class="fas fa-trash"></i> (0)
                    </button>
                    <button class="btn btn-primary" onclick="openMarketModal()">
                        <i class="fas fa-plus"></i> Thêm mới
                    </button>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-scroll-head">
                    <table class="market-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>
                                <th>STT</th>
                                <th>Mã thị trường</th>
                                <th>Tên thị trường</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                    </table>
                </div>
                <div class="table-scroll-body" id="market-table-scroll-body">
                    <table class="market-table">
                        <tbody id="market-table-body">
                            <!-- Data rendered by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="pagination-bar">
                <span id="pagination-info">Hiển thị 0 - 0 trong 0</span>
                <div class="pagination-controls">
                    <button class="page-btn" id="prev-page" onclick="prevPage()" disabled>&lt;</button>
                    <div id="page-numbers" class="page-numbers"></div>
                    <button class="page-btn" id="next-page" onclick="nextPage()">&gt;</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Thị trường -->
    <div id="market-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeMarketModal()"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Thêm mới thị trường</h3>
            </div>
            <div class="modal-body">
                <form id="market-form">
                    <input type="hidden" id="market-id">
                    <div class="form-group">
                        <label>Mã thị trường <span class="required">*</span></label>
                        <input type="text" id="market-code" required placeholder="Ví dụ: JP">
                    </div>
                    <div class="form-group">
                        <label>Tên thị trường <span class="required">*</span></label>
                        <input type="text" id="market-name" required placeholder="Ví dụ: Nhật Bản">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeMarketModal()">Hủy</button>
                <button class="btn btn-primary" onclick="saveMarket()">Lưu</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div id="delete-confirm-modal" class="modal-confirm">
        <div class="confirm-content">
            <div class="confirm-icon-box"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 class="confirm-title">Xác nhận xóa</h3>
            <p class="confirm-message" id="confirm-delete-message">
                Bạn có chắc chắn muốn xóa thị trường này không?
            </p>
            <div class="confirm-actions">
                <button onclick="closeDeleteConfirm()" class="btn btn-secondary">Hủy</button>
                <button onclick="confirmDeleteMarket()" class="btn btn-danger">Xóa</button>
            </div>
        </div>
    </div>

    <script src="market.js?v=1.1"></script>
    <script>
        // Sync horizontal scroll: tbody scrolls, thead follows
        document.addEventListener('DOMContentLoaded', function () {
            const scrollBody = document.getElementById('market-table-scroll-body');
            const scrollHead = document.querySelector('.market-container .table-scroll-head');
            if (scrollBody && scrollHead) {
                scrollBody.addEventListener('scroll', function () {
                    scrollHead.scrollLeft = scrollBody.scrollLeft;
                });
            }
        });
    </script>
</body>
</html>
