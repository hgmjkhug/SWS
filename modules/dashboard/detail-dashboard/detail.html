<body>

<!-- TOPBAR -->
<div class="topbar" style="display:none;">
  <div class="clock-block">
    <div class="clock-time" id="rt-time">00:00:00</div>
    <div class="clock-date" id="rt-date">--</div>
  </div>
  <button class="btn-sync" id="btn-sync" onclick="doSync()" title="Đồng bộ">
    <i class="fas fa-arrows-rotate"></i>
  </button>
</div>

<div class="dash">

  <!-- ROW 0: KPI STRIP -->
  <div class="row-kpi row-kpi-3">
    <!-- Pie: Vị trí kho (chiếm 2 cột) -->
    <div class="kpi-pie-card">
      <div class="kpi-pie-head">
        <i class="fas fa-warehouse"></i>
        <span>Vị trí kho</span>
      </div>
      <div class="kpi-pie-body">
        <div class="kpi-pie-wrap">
          <canvas id="c-pos" width="110" height="110"></canvas>
          <div class="kpi-pie-center">
            <span class="kpi-pie-n" id="pos-pct">0%</span>
          </div>
        </div>
        <div class="kpi-pie-legend dev-legend" id="pos-legend">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
    <!-- Pie: Số khu vực -->
    <div class="kpi-pie-card">
      <div class="kpi-pie-head">
        <i class="fas fa-map"></i>
        <span>Số khu vực</span>
      </div>
      <div class="kpi-pie-body">
        <div class="kpi-pie-wrap">
          <canvas id="c-area" width="110" height="110"></canvas>
          <div class="kpi-pie-center">
            <span class="kpi-pie-n" id="area-total">0</span>
          </div>
        </div>
        <div class="kpi-pie-legend dev-legend" id="area-legend">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
    <!-- Card: Thống kê sản phẩm -->
    <div class="kpi-pie-card">
      <div class="kpi-pie-head">
        <i class="fas fa-box-open"></i>
        <span>Thống kê sản phẩm</span>
      </div>
      <div class="kpi-pie-body" style="justify-content:center;">
        <div class="kpi-pie-legend" id="prod-stats-content" style="gap:15px; padding:10px;">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </div>

  <div class="row-kpi row-kpi-stats" style="margin-top:0px;">
    <!-- Average Completion Time Chart (Moved here and made wider) -->
    <div class="card card-stats-wide">
      <div class="card-head">
        <div class="card-title"><i class="fas fa-chart-bar"></i>Thống kê và thời gian trung bình hoàn thành lệnh</div>
      </div>
      <div class="chart-body" style="padding: 20px 20px 10px 40px; height: 180px; position:relative;">
        <!-- Y Axis -->
        <div class="y-axis" style="position:absolute; left:10px; top:20px; bottom:30px; display:flex; flex-direction:column; justify-content:space-between; font-size:11px; color:var(--text-3); align-items:flex-end;">
          <span>10</span><span>5</span><span>0</span>
        </div>
        <!-- Grid lines -->
        <div class="grid-lines" style="position:absolute; left:40px; right:20px; top:20px; bottom:30px; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none;">
          <div style="border-top:1px dashed var(--border); width:100%; height:0;"></div>
          <div style="border-top:1px dashed var(--border); width:100%; height:0;"></div>
          <div style="border-top:1px solid var(--border); width:100%; height:0;"></div>
        </div>
        <!-- Bars Container -->
        <div class="bars-wrap" id="completion-bars" style="position:absolute; left:40px; right:20px; top:20px; bottom:30px; display:flex; align-items:flex-end; justify-content:space-around; z-index:1;">
          <!-- JS will render bars here -->
        </div>
      </div>
    </div>

    <!-- Pie: Số lô hàng -->
    <div class="kpi-pie-card kpi-narrow">
      <div class="kpi-pie-head">
        <i class="fas fa-boxes-stacked"></i>
        <span>Số lô hàng</span>
      </div>
      <div class="kpi-pie-body">
        <div class="kpi-pie-wrap small-pie">
          <canvas id="c-batch" width="80" height="80"></canvas>
          <div class="kpi-pie-center">
            <span class="kpi-pie-n" id="batch-total" style="font-size:14px;">0</span>
          </div>
        </div>
        <div class="kpi-pie-legend" id="batch-legend" style="gap:2px;">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
    <!-- Pie: Tổng lệnh -->
    <div class="kpi-pie-card kpi-narrow">
      <div class="kpi-pie-head">
        <i class="fas fa-list-check"></i>
        <span>Tổng lệnh</span>
      </div>
      <div class="kpi-pie-body">
        <div class="kpi-pie-wrap small-pie">
          <canvas id="c-cmd" width="80" height="80"></canvas>
          <div class="kpi-pie-center">
            <span class="kpi-pie-n" id="cmd-total" style="font-size:14px;">0</span>
          </div>
        </div>
        <div class="kpi-pie-legend" style="gap:2px;">
          <div class="kpi-leg-row" style="padding:2px 4px;"><span class="kpi-leg-dot" style="background:#34d399"></span><span class="kpi-leg-label" style="font-size:11px;">Xong</span><span class="kpi-leg-val" id="cmd-done" style="font-size:11px;">0</span></div>
          <div class="kpi-leg-row" style="padding:2px 4px;"><span class="kpi-leg-dot" style="background:#60a5fa"></span><span class="kpi-leg-label" style="font-size:11px;">Đang</span><span class="kpi-leg-val" id="cmd-prog" style="font-size:11px;">0</span></div>
          <div class="kpi-leg-row" style="padding:2px 4px;"><span class="kpi-leg-dot" style="background:#f87171"></span><span class="kpi-leg-label" style="font-size:11px;">Lỗi</span><span class="kpi-leg-val" id="cmd-err" style="font-size:11px;">0</span></div>
        </div>
      </div>
    </div>
    <!-- Pie: Số thiết bị -->
    <div class="kpi-pie-card kpi-narrow">
      <div class="kpi-pie-head">
        <i class="fas fa-microchip"></i>
        <span>Số thiết bị</span>
      </div>
      <div class="kpi-pie-body">
        <div class="kpi-pie-wrap small-pie">
          <canvas id="c-dev" width="80" height="80"></canvas>
          <div class="kpi-pie-center">
            <span class="kpi-pie-n" id="dev-total" style="font-size:14px;">0</span>
          </div>
        </div>
        <div class="kpi-pie-legend dev-legend" id="dev-legend" style="gap:2px;">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- KANBAN ROW (FULL WIDTH) -->
  <div class="row-kanban">
    <!-- Mission Kanban -->
    <div class="card" style="display:none;">
      <div class="card-head">
        <div class="card-title"><i class="fas fa-table-columns"></i>Danh sách lệnh trong ngày</div>
      </div>
      <div class="kanban-body">
        <!-- ƯU TIÊN -->
        <div class="kanban-col">
          <div class="col-head">
            <span class="col-label amber"><span class="col-icon">🔴</span>Ưu tiên</span>
            <span class="col-count amber" id="k-urgent-count">0</span>
          </div>
          <div class="kanban-items" id="k-urgent"></div>
        </div>
        <!-- ĐANG CHỜ -->
        <div class="kanban-col">
          <div class="col-head">
            <span class="col-label gray" style="color:var(--text-3);"><span class="col-icon">⏳</span>Đang chờ</span>
            <span class="col-count gray" id="k-wait-count" style="background:var(--border);color:var(--text-2);">0</span>
          </div>
          <div class="kanban-items" id="k-wait"></div>
        </div>
        <!-- ĐANG XỬ LÝ -->
        <div class="kanban-col">
          <div class="col-head">
            <span class="col-label accent" style="color:var(--accent);"><span class="col-icon">⚡</span>Đang xử lý</span>
            <span class="col-count accent" id="k-prog-count" style="background:var(--acc-s);color:var(--accent);">0</span>
          </div>
          <div class="kanban-items" id="k-prog"></div>
        </div>
        <!-- HOÀN THÀNH -->
        <div class="kanban-col">
          <div class="col-head">
            <span class="col-label green"><span class="col-icon">✅</span>Hoàn thành</span>
            <span class="col-count green" id="k-done-count">0</span>
          </div>
          <div class="kanban-items" id="k-done"></div>
        </div>
        <!-- LỖI -->
        <div class="kanban-col">
          <div class="col-head">
            <span class="col-label red"><span class="col-icon">❌</span>Lỗi</span>
            <span class="col-count red" id="k-err-count">0</span>
          </div>
          <div class="kanban-items" id="k-err"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 1: MISSION ANALYSIS & MAINTENANCE -->
  <div class="row-analysis" style="display:grid; grid-template-columns: 1fr 340px 340px; gap:16px; margin-bottom:16px;">
    
    <!-- Inventory Progress Bars -->
    <div class="card" style="display:flex; flex-direction:column;">
      <div class="card-head">
        <div class="card-title"><i class="fas fa-cubes"></i>Tổng tồn kho</div>
        <div class="card-tag">Tổng: <span id="inv-total">0</span></div>
      </div>
      <div class="inv-progress-wrap" id="inv-progress-wrap">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Error Analysis -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><i class="fas fa-chart-simple"></i>Thống kê lỗi</div>
      </div>
      <div class="err-list" id="err-list"></div>
      <div class="err-tip" id="err-tip" style ="display:none;"></div>
    </div>

    <!-- Predictive Maintenance -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><i class="fas fa-screwdriver-wrench"></i>Dự báo bảo trì</div>
      </div>
      <div class="pred-list" id="pred-list"></div>
    </div>

  </div>

</div>
<link rel="stylesheet" href="detail.css" />
<script src="detail.js"></script>
</body>
</html>
