<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifter - Smart Warehouse</title>
    <link href="https://site-assets.fontawesome.com/releases/v7.2.0/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="lifter.css">
</head>
<body>

    <div class="warehouse-section">
        <div class="tower-container" id="tower">
            <div class="lift-shaft"></div>
            <div id="lifter">
                <div class="lifter-platform"></div>
            </div>
        </div>

        <div class="conveyor-system">
            <div class="lane lane-in">
                <span>INBOUND LANE (NHẬP)</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="lane lane-out">
                <i class="fas fa-chevron-left"></i>
                <span>OUTBOUND LANE (XUẤT)</span>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="header-top">
            <h3><i class="fas fa-microchip"></i> TOWER MONITOR</h3>
            <div id="date-display" class="date-badge">--/--/----</div>
        </div>

        <div class="status-section">
            <div class="stat-card">
                <div class="stat-label">TRẠNG THÁI (DEVICE STATUS)</div>
                <div id="status-text" class="stat-value">ĐANG CHỜ (WAITING)</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-op">VẬN HÀNH</button>
            <button class="tab-btn" id="tab-api">API LOGS</button>
        </div>

        <div class="log-viewport">
            <div id="op-log-content">
                <div id="op-log"></div>
            </div>
            <div id="api-log-content" style="display:none">
                <div id="api-log"></div>
            </div>
        </div>
    </div>

    <script src="lifter.js"></script>
</body>
</html>
