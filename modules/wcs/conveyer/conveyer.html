<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyer - Horizontal Stacker Crane</title>
    <link href="https://site-assets.fontawesome.com/releases/v7.2.0/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="conveyer.css">
</head>
<body>

    <div class="warehouse-viewport">
        <div class="warehouse-container-horizontal">
            <div class="block-row" id="block-top"></div>
            
            <div class="aisle-horizontal">
                <div id="crane" class="crane-horizontal">
                    <div class="crane-arm"></div>
                </div>
            </div>

            <div class="block-row" id="block-bottom"></div>
        </div>
    </div>

    <div class="panel">
        <div class="header-top">
            <h3>WMS SYSTEM MONITOR</h3>
            <div id="display-today" class="current-date-badge">DD/MM/YYYY</div>
        </div>

        <div class="status-section">
            <div class="stat-card">
                <div class="stat-label">TRẠNG THÁI THIẾT BỊ (DEVICE STATUS)</div>
                <div id="crane-status" class="stat-value">ĐANG CHỜ (WAITING)</div>
            </div>
        </div>

        <div class="log-tabs">
            <button class="tab-btn active" onclick="switchTab('op-tab', this)">VẬN HÀNH (OPERATIONS)</button>
            <button class="tab-btn" onclick="switchTab('api-tab', this)">API LOGS</button>
        </div>

        <div class="log-viewport">
            <div id="op-tab" class="log-content active"><div id="op-log"></div></div>
            <div id="api-tab" class="log-content"><div id="api-log-list"></div></div>
        </div>
    </div>

    <script src="conveyer.js"></script>
</body>
</html>
