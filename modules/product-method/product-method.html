<div class="product-method-container">
  <div class="module-header">
    <div class="search-controls">
      <div class="filter-group">
        <input
          type="text"
          id="product-search"
          class="product-search-input"
          placeholder="Tìm theo mã hoặc tên sản phẩm..."
          oninput="filterProducts()"
        />
      </div>
      <div class="filter-group">
        <label class="filter-title">Nhóm sản phẩm</label>
        <div class="custom-dropdown" id="group-filter-dropdown" style="min-width: 200px">
          <div class="custom-dropdown-toggle" onclick="toggleFilterDropdown('group')">
            <span id="group-filter-display">Tất cả nhóm</span>
            <i class="fas fa-chevron-down" style="font-size: 12px; color: #64748b"></i>
          </div>
          <div class="custom-dropdown-menu" id="group-filter-menu">
            <!-- Populated by JS -->
          </div>
          <input type="hidden" id="group-filter" value="">
        </div>
      </div>
    </div>
    <div class="module-actions">
      <button id="btn-trigger-bulk" class="btn-trigger-bulk" onclick="showBulkAssignBar()">
        <i class="fas fa-layer-group"></i> Gán quy cách
      </button>
      <div id="bulk-action-bar" class="bulk-action-bar" style="display: none;">
        <span class="bulk-label"><i class="fas fa-layer-group"></i> Gán quy cách:</span>
        <div class="custom-dropdown" id="method-bulk-dropdown" style="min-width: 100px">
          <div class="custom-dropdown-toggle" onclick="toggleFilterDropdown('method')">
            <span id="method-bulk-display">FIFO</span>
            <i class="fas fa-chevron-down" style="font-size: 10px; color: #3b82f6"></i>
          </div>
          <div class="custom-dropdown-menu" id="method-filter-menu">
            <div class="custom-dropdown-item selected" onclick="selectBulkOption('FIFO', 'FIFO')">FIFO</div>
            <div class="custom-dropdown-item" onclick="selectBulkOption('FEFO', 'FEFO')">FEFO</div>
            <div class="custom-dropdown-item" onclick="selectBulkOption('LIFO', 'LIFO')">LIFO</div>
          </div>
          <input type="hidden" id="bulk-method-select" value="FIFO">
        </div>
        <div class="bulk-actions-btns">
          <button class="btn-apply" onclick="applyBulkMethod()">
            <i class="fas fa-check"></i> Áp dụng
          </button>
          <button class="btn-cancel" onclick="cancelBulkAction()">
            <i class="fas fa-times"></i> Hủy
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="table-scroll-head">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width: 50px; text-align: center">
            <input type="checkbox" id="select-all" onclick="toggleSelectAll(this)" />
          </th>
          <th style="width: 50px; text-align: center">STT</th>
          <th style="width: 120px; text-align: center; padding-left: 15px">Mã sản phẩm</th>
          <th style="width: 250px; text-align: left; padding-left: 15px">Tên sản phẩm</th>
          <th style="width: 200px; text-align: left; padding-left: 15px">Nhóm sản phẩm</th>
          <th style="width: 140px; text-align: center">Quy cách</th>
        </tr>
      </thead>
    </table>
  </div>

  <div class="table-scroll-body">
    <table class="data-table">
      <tbody id="product-method-table-body">
        <!-- Data rendered by JS -->
      </tbody>
    </table>
  </div>

  <div class="pagination-bar">
    <div class="pagination-info">
      Hiển thị <span id="showing-range">0-0</span> trên tổng <span id="total-items">0</span>
    </div>
    <div class="pagination-controls">
      <button class="btn-page" id="btn-prev" onclick="changePage(-1)">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div id="pagination-numbers" class="pages-numbers">
        <!-- Page numbers rendered by JS -->
      </div>
      <button class="btn-page" id="btn-next" onclick="changePage(1)">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>

<!-- Load CSS and JS -->
<link href="modules/product-method/product-method.css" rel="stylesheet" />
<script src="modules/product-method/product-method.js"></script>
