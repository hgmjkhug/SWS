<body>
  <div class="kanban-view">
    <!-- Toolbar Section -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- Warehouse Filter (Searchable Combobox) -->
        <div class="custom-dropdown" id="warehouse-filter">
          <div class="combo-wrapper">
            <input type="text" class="combo-input" placeholder="Chọn kho..." id="warehouse-input" autocomplete="off" />
            <i class="fas fa-chevron-down combo-icon"></i>
          </div>
          <div class="dropdown-options" id="warehouse-options">
            <div class="dropdown-option" data-value="all">Tất cả kho</div>
          </div>
        </div>
      </div>

      <div class="toolbar-right">
        <!-- Search Box -->
        <div class="search-box-panel">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="search-input" placeholder="Tìm phiếu nhập/xuất..." autocomplete="off" />
        </div>
      </div>
    </div>

    <!-- Kanban Board Section -->
    <div class="kanban-board">
      <!-- Column 1: Waiting (Pending) -->
      <div class="kanban-column" data-status="pending">
        <div class="column-header header-pending">
          <span class="column-title">Đang chờ (Pending)</span>
          <span class="column-count" id="count-pending">0</span>
        </div>
        <div class="column-content" id="col-pending">
          <!-- Cards will be injected here -->
        </div>
      </div>

      <!-- Column 2: In Progress -->
      <div class="kanban-column" data-status="in_progress">
        <div class="column-header header-progress">
          <span class="column-title">Đang xử lý (In Progress)</span>
          <span class="column-count" id="count-in_progress">0</span>
        </div>
        <div class="column-content" id="col-in_progress">
          <!-- Cards will be injected here -->
        </div>
      </div>

      <!-- Column 3: Complete -->
      <div class="kanban-column" data-status="complete">
        <div class="column-header header-complete">
          <span class="column-title">Hoàn thành (Complete)</span>
          <span class="column-count" id="count-complete">0</span>
        </div>
        <div class="column-content" id="col-complete">
          <!-- Cards will be injected here -->
        </div>
      </div>

      <!-- Column 4: Bug (Error) -->
      <div class="kanban-column" data-status="bug">
        <div class="column-header header-bug">
          <span class="column-title">Lỗi (Bug)</span>
          <span class="column-count" id="count-bug">0</span>
        </div>
        <div class="column-content" id="col-bug">
          <!-- Cards will be injected here -->
        </div>
      </div>
    </div>
  </div>
  <link rel="stylesheet" href="kanban.css" />
  <script src="kanban.js"></script>
</body>

</html>
