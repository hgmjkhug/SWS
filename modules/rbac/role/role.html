<div class="role-container">
  <div class="module-header">
    <div class="role-search-box">
      <i class="fas fa-search"></i>
      <input
        type="text"
        id="role-search"
        placeholder="Tìm kiếm vai trò..."
        oninput="filterRoles()"
      />
    </div>
    <div class="module-actions">
      <button class="btn btn-primary" onclick="openRoleModal()">
        <i class="fas fa-plus"></i> Thêm mới
      </button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width: 50px; text-align: center">STT</th>
          <th>Tên vai trò</th>
          <th style="width: 120px; text-align: center">Số quyền</th>
          <th>Mô tả</th>
          <th style="width: 120px; text-align: center">Hành động</th>
        </tr>
      </thead>
      <tbody id="role-table-body">
        <!-- Data rendered by JS -->
      </tbody>
    </table>
  </div>

  <div class="pagination-bar">
    <span id="role-page-info">Hiển thị 1-4 trên tổng 4</span>
    <div class="pagination-controls">
      <button class="btn-page" onclick="prevPage()" id="btn-prev" disabled>
        <i class="fas fa-chevron-left"></i>
      </button>
      <div id="role-pages" class="pages-numbers">
        <button class="btn-page active">1</button>
      </div>
      <button class="btn-page" onclick="nextPage()" id="btn-next" disabled>
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>

<!-- Add/Edit Role Modal -->
<div class="modal-overlay" id="role-modal">
  <div class="modal-box" style="width: 750px; max-width: 95vw;">
    <div class="modal-header">
      <h3 class="modal-title" id="role-modal-title">Thêm mới vai trò</h3>
      <button class="modal-close-square" onclick="closeRoleModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="role-id" />
      <div class="form-group">
        <label>Tên vai trò <span class="text-danger">*</span></label>
        <input type="text" id="role-name" placeholder="Nhập tên vai trò" />
        <small class="error-message" id="role-name-error"></small>
      </div>

      <div class="form-group">
        <label>Mô tả</label>
        <textarea
          id="role-desc"
          rows="3"
          placeholder="Mô tả chi tiết vai trò"
        ></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeRoleModal()">Hủy</button>
      <button class="btn-primary" onclick="saveRole()">Lưu</button>
    </div>
  </div>
</div>

<!-- Assign Permission Modal (NEW) -->
<div class="modal-overlay" id="assign-permission-modal">
  <div class="modal-box" style="width: 1000px; max-width: 95vw">
    <div class="modal-header">
      <h3 class="modal-title">
        Phân quyền vai trò: <span id="assign-header-role" style="color: #076EB8"></span>
      </h3>
      <button class="modal-close-square" onclick="closeAssignPermissionModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body" style="padding: 0">
      <div class="permission-table-wrapper">
        <table class="permission-table">
          <thead>
            <tr>
              <th style="width: 60px; text-align: center">STT</th>
              <th style="width: 400px; text-align: left">Tên menu</th>
              <th style="width: 80px; text-align: center">Tất cả</th>
              <th style="width: 92px; text-align: center">Xem</th>
              <th style="width: 92px; text-align: center">Thêm</th>
              <th style="width: 92px; text-align: center">Sửa</th>
              <th style="width: 92px; text-align: center">Xóa</th>
            </tr>
          </thead>
          <tbody id="assign-permission-table-body">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-secondary" onclick="selectAllPermissions()">Chọn tất cả</button>
        <button class="btn btn-secondary" onclick="deselectAllPermissions()">Bỏ chọn tất cả</button>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-secondary" onclick="closeAssignPermissionModal()">Đóng</button>
        <button class="btn btn-primary" onclick="saveAssignPermissions()">Lưu</button>
      </div>
    </div>
  </div>
</div>

<!-- Permission Detail Modal (Keep for viewing, but set same style) -->
<div class="modal-overlay" id="permission-detail-modal">
  <div class="modal-box" style="width: 1000px; max-width: 95vw">
    <div class="modal-header">
      <h3
        class="modal-title"
        id="perm-header-title"
        style="font-weight: 700; color: #1e293b"
      >
        Chi tiết quyền:
        <span id="perm-header-role" style="color: #076EB8"></span>
      </h3>
      <button class="modal-close-square" onclick="closePermissionDetailModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body" style="padding: 0">
      <!-- Permission Info Box -->
      <div class="perm-info-box">
        <div class="perm-info-title">
          <strong id="perm-info-name"></strong> -
          <span id="perm-info-desc"></span>
        </div>
        <div class="perm-info-count" id="perm-info-count-text"></div>
      </div>

      <div class="permission-table-wrapper">
        <table class="permission-table">
          <thead>
            <tr>
              <th style="width: 60px; text-align: center">STT</th>
              <th style="width: 400px; text-align: left">Tên menu</th>
              <th style="width: 80px; text-align: center">Tất cả</th>
              <th style="width: 92px; text-align: center">Xem</th>
              <th style="width: 92px; text-align: center">Thêm</th>
              <th style="width: 92px; text-align: center">Sửa</th>
              <th style="width: 92px; text-align: center">Xóa</th>
            </tr>
          </thead>
          <tbody id="permission-table-body">
            <!-- Accordion Content rendered by JS -->
          </tbody>
        </table>
      </div>

      <div class="modal-footer">
        <button
          class="btn btn-secondary"
          onclick="closePermissionDetailModal()"
        >
          Đóng
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Popover (Standardized) -->
<div id="delete-confirm-modal" class="modal-confirm">
  <div class="confirm-content">
    <div class="confirm-icon-box">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h3 class="confirm-title">Xác nhận xóa</h3>
    <p class="confirm-message">
      Bạn có chắc chắn muốn xóa vai trò này không?<br />Hành động này không thể
      hoàn tác.
    </p>
    <div class="confirm-actions">
      <button onclick="closeDeleteConfirm()" class="btn btn-secondary">
        Hủy
      </button>
      <button onclick="confirmDeleteRole()" class="btn btn-danger">Xóa</button>
    </div>
  </div>
</div>

<!-- Load CSS and JS -->
<link href="role.css" rel="stylesheet" />
<script src="role.js"></script>
